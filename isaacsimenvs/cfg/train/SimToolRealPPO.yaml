# SimToolReal rl_games PPO config.
#
# Ported from isaacgymenvs/cfg/train/SimToolRealPPO.yaml with the
# isaacgymenvs-specific Hydra interpolations (${....task.env.numEnvs},
# ${...seed}, ${....experiment}, ...) rewritten to the isaacsimenvs convention
# where the ConfigStore root is {env, agent}.
#
# NOT currently consumed by any trainer — SimToolReal's training path isn't
# ported yet. This file exists for registry parity with Cartpole and as a
# faithful reference for the future training port. `play_simtoolreal.py`
# (pretrained-policy rollout) loads the PRETRAINED checkpoint's config,
# not this file.

params:
  seed: 42

  env:
    clip_observations: 10.0     # matches SimToolReal.yaml clampAbsObservations
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: 'fixed'
    mlp:
      units: [1024, 1024, 512, 512]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: 0_simtoolreal
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: True
    normalize_input: True
    normalize_value: True
    normalize_advantage: True
    reward_shaper:
      scale_value: 0.01
    num_actors: ${....env.scene.num_envs}
    gamma: 0.99
    tau: 0.95
    learning_rate: 1e-4
    lr_schedule: adaptive
    schedule_type: standard
    kl_threshold: 0.016
    score_to_win: 1000000
    max_epochs: 1000000
    save_best_after: 100
    save_frequency: 3000
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.1
    minibatch_size: 32768
    mini_epochs: 4
    critic_coef: 4.0
    clip_value: True
    horizon_length: 16
    seq_length: 16
    bounds_loss_coef: 0.0001

    # Required by our vendored rl_games fork (a2c_common.py:398 unguarded
    # .startswith on expl_type). PPO stays "none".
    expl_type: none
    use_others_experience: none

    player:
      deterministic: False
      games_num: 100000
      print_stats: False
