# Lifted from isaaclab_tasks/direct/cartpole/agents/rl_games_ppo_cfg.yaml.
# `env_name: rlgpu` matches what isaacsimenvs/utils/rlgames_utils.py registers.

params:
  seed: 42

  env:
    clip_observations: 5.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: 'fixed'    # our fork needs a string ('fixed' | 'coef_cond' | 'obs_cond'), not bool
    mlp:
      units: [32, 32]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    # Must start with `<int>_` — our vendored rl_games parses policy_idx from the prefix.
    name: 0_cartpole_direct
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    num_actors: ${....env.scene.num_envs}
    reward_shaper:
      scale_value: 0.1
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 5e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 20000
    max_epochs: 150
    save_best_after: 50
    save_frequency: 25
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 16384
    mini_epochs: 8
    critic_coef: 4
    clip_value: True
    seq_length: 4
    bounds_loss_coef: 0.0001

    # Required by our vendored rl_games fork (a2c_common.py:398 does an unguarded
    # .startswith on expl_type). PPO stays "none"; SAPG overrides to mixed_expl_*.
    expl_type: none
    use_others_experience: none

    player:
      deterministic: False
      games_num: 100000
      print_stats: False
