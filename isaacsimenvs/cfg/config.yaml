defaults:
  - task: Cartpole
  - train: ${task}PPO
  - _self_

task_name: ${task.name}
experiment: ''
num_envs: ''
seed: 42
headless: true
test: false
checkpoint: ''
max_iterations: ''
rl_device: cuda:0
sim_device: cuda:0
capture_video: false
# Video capture knobs (honored when capture_video=true; wandb upload only when wandb_activate=true)
video_interval: 10          # Start a new capture window every N training iters
video_capture_frames: 120   # Frames per window (= video_capture_frames / video_fps seconds of sim)
video_fps: 30

# Wandb (mirrors isaacgymenvs/cfg/config.yaml)
wandb_activate: false
wandb_project: 'isaacsimenvs'
wandb_group: ''
wandb_name: '${task.name}_${now:%Y-%m-%d_%H-%M-%S}'
wandb_entity: ''
wandb_tags: []
wandb_notes: ''
wandb_logcode_dir: ''

hydra:
  run:
    dir: ./runs/${task.name}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
