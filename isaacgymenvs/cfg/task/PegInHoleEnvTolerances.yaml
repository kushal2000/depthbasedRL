defaults:
  - PegInHoleEnv
  - _self_

env:
  # Tolerance-generalization train set: log-uniform pool in [0.5, 1.0] mm.
  # Val set lives at assets/urdf/peg_in_hole_tolerances/scenes_val/ and is
  # never used at training time.
  scenesPath: "assets/urdf/peg_in_hole_tolerances/scenes/scenes.npz"
  asset:
    table: "urdf/peg_in_hole_tolerances/scenes/scene_0000/scene_tol00.urdf"

  # Match the unfixtured `peg_preinsfinal_pretrained` recipe — the tolerance
  # study fine-tunes that recipe with vs. without goal-observation noise.
  goalMode: "preInsertAndFinal"
  liftingRewScale: 0.0
  liftingBonus: 0.0
