defaults:
  - SimToolReal
  - _self_

name: PegInHoleEnv

env:
  # ── Peg-in-hole scene source ─────────────────────────────────
  # Path relative to repo root. Generated by
  # `peg_in_hole/scene_generation/generate_scenes.py`.
  scenesPath: "assets/urdf/peg_in_hole/scenes/scenes.npz"

  # Always set — the peg (registered via peg_in_hole.objects) is the
  # manipulated object. `table` is set per-env at env-creation time from
  # the per-(scene, tol_slot) URDF; the yaml value below is only a
  # placeholder used for env-0 during parent init.
  objectName: "peg"
  useFixedGoalStates: True
  useFixedInitObjectPose: True
  asset:
    table: "urdf/peg_in_hole/scenes/scene_0000/scene_tol00.urdf"

  # ── Goal trajectory mode ─────────────────────────────────────
  # "dense"              — use all waypoints per (scene, peg).
  # "preInsertAndFinal"  — truncate to last two waypoints
  #                        (pre-insertion pose + inserted pose);
  #                        max_consecutive_successes = 2.
  # "finalGoalOnly"      — truncate to just the final waypoint;
  #                        max_consecutive_successes = 1.
  goalMode: "dense"

  # ── Retract phase ────────────────────────────────────────────
  # After all insertion goals are reached, enter a retract phase where
  # the policy is rewarded for moving its hand away from the peg while
  # the peg stays at the final goal pose. Copied verbatim from FabricaEnv.
  enableRetract: True
  retractRewardScale: 1.0
  retractDistanceThreshold: 0.1        # min hand-peg distance for "retracted"
  retractSuccessBonus: 1000.0
  retractSuccessTolerance: 0.005       # peg must be within 5 mm of final goal (m)
