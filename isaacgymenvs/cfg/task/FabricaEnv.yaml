defaults:
  - SimToolReal
  - _self_

name: FabricaEnv

env:
  enableRetract: True
  retractRewardScale: 1.0
  retractDistanceThreshold: 0.1
  retractSuccessBonus: 1000.0
  retractSuccessTolerance: 0.005  # Object must be within 5mm for retract reward (meters)

  # ── Multi-part training ──────────────────────────────────────
  # When multiPart is True, trains all parts simultaneously.
  # Each env is assigned a part via round-robin (env_idx % num_parts).
  #
  # Only objectNames is required. Scene URDFs, start poses, and
  # goal trajectories are auto-derived from the object name pattern:
  #   beam_2_coacd → assembly=beam, part=2, method=coacd
  #   → scene: urdf/fabrica/environments/beam_2/scene_coacd.urdf
  #   → trajectory: fabrica/trajectories/beam_2/pick_place.json
  multiPart: False
  objectNames: null

  # ── Multi-init-states training ──────────────────────────────
  # When True (requires multiPart=True and enableRetract=True),
  # loads scenes.npz for the assembly and samples a random
  # (start_pose, trajectory) per env on each reset.
  # All parts must belong to the same assembly.
  multiInitStates: False
