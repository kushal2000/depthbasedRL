defaults:
  - SimToolReal
  - _self_

name: FabricaEnv

env:
  # ── Single-insertion schema ──────────────────────────────────
  # Locates assets/urdf/fabrica/<assemblyName>/<scenesFilename> +
  # assets/urdf/fabrica/<assemblyName>/insertion_scenes/{p}/scene_NNNN.urdf.
  # Generated by `fabrica/scene_generation/scale_assembly.py` +
  # `fabrica/scene_generation/generate_scenes.py`.
  assemblyName: "beam_2x"
  scenesFilename: "scenes.npz"        # smoke tests / val runs override to e.g. scenes_smoke.npz

  # ── Goal trajectory mode ─────────────────────────────────────
  # "dense"             — use all waypoints per (part, scene, start).
  # "preInsertAndFinal" — truncate to last two waypoints
  #                       (pre-insert + insert); max_consecutive_successes = 2.
  # "finalGoalOnly"     — truncate to just the final waypoint;
  #                       max_consecutive_successes = 1.
  goalMode: "dense"

  # ── Peg-in-hole defaults (override SimToolReal base) ─────────
  resetPositionNoiseX: 0.10
  resetPositionNoiseY: 0.10
  resetPositionNoiseZ: 0.02
  randomizeObjectRotation: True
  withTableForceSensor: False          # off during training; eval tool flips to True
  tableForceResetThreshold: 100.0      # only consumed when withTableForceSensor=True

  # ── Eval: pin to a specific (part, scene, start) combo ──────
  # When any of these are >= 0, all envs use the pinned value instead of
  # the round-robin assignment. Used by fabrica_multi_init_eval.py to drive
  # a specific (insertion_part, scene_idx) with a specific start pose.
  # Leave at -1 for training.
  forcePartIdx: -1
  forceSceneIdx: -1
  forceStartIdx: -1

  # ── Goal observation noise ───────────────────────────────────
  # Per-episode XY offset (uniform in ±goalXyObsNoise) applied to every
  # goal waypoint observed by the actor only. Does NOT affect reward,
  # success, reset, trajectory cycling, or the asymmetric critic
  # (states_buf). Set to 0 to disable.
  goalXyObsNoise: 0.002   # ±2 mm uniform per-episode XY jitter on goal (obs-only)

  # ── Retract phase (hand pulls away after final goal) ─────────
  enableRetract: True
  retractRewardScale: 1.0
  retractDistanceThreshold: 0.1
  retractSuccessBonus: 1000.0
  retractSuccessTolerance: 0.005
