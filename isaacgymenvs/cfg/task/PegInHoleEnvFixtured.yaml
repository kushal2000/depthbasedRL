defaults:
  - PegInHoleEnv
  - _self_

name: PegInHoleEnvFixtured

env:
  # ── Fixtured-task scene source ───────────────────────────────
  # Generated by peg_in_hole_fixtured/scene_generation/generate_scenes.py.
  # Schema adds `start_fixture_positions (N, M, 3)` and
  # `start_tolerance_m (scalar)`; `start_poses` are the in-fixture upright
  # peg poses (handle vertical) and `goals` are the lift→transit→insert
  # trajectories from the start fixture to the goal fixture.
  scenesPath: "assets/urdf/peg_in_hole_fixtured/scenes/scenes.npz"
  asset:
    table: "urdf/peg_in_hole_fixtured/scenes/scene_0000/peg_0000/scene_tol00.urdf"

  # ── Lift reward (off — peg already upright in the start fixture) ──
  # The lift-from-table phase doesn't exist in the fixtured task; the
  # policy only needs to extract → translate → insert.
  liftingRewScale: 0.0
  liftingBonus: 0.0
