num_episodes: 1
max_steps: 700
action_loss_weight: 1.0
aux_object_pos_weight: 1.0
hand_moving_average: 0.1
arm_moving_average: 0.1
dof_speed_scale: 1.5
control_dt: 0.016666666666666666
checkpoint_interval: 10
image_height: 90
image_width: 160
learning_rate: 0.0001
num_envs: 512
env_spacing: 4.0
object_start_mode: randomized
object_pos_noise_xyz: [0.1, 0.1, 0.02]
object_yaw_noise_deg: 180.0
object_rotation_noise_mode: yaw
hole_pos_noise_xyz: [0.001, 0.001, 0.0]
camera_pos_noise_xyz: [0.001, 0.001, 0.001]
camera_rot_noise_deg: [0.1, 0.1, 0.1]
camera_backend: tiled
depth_preprocess_mode: window_normalize
depth_min_m: 0.55
depth_max_m: 1.60
image_robustness:
  enabled: true
  depth_aug:
    enabled: true
    correlated_noise_std_px: 0.05
    correlated_noise_std_depth: 0.0166666667
    normal_noise_std_m: 0.001
    pixel_dropout_prob: 0.0003
    random_blob_prob: 0.0003
    stick_prob: 0.00025
episode_length: 600
reset_when_dropped: false
online_num_iters: 350000
online_log_interval: 1000
online_update_interval: 1
